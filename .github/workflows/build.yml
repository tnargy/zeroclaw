name: Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.93.1
          default: true
      - name: Build
        run: cargo build --release --locked --features channel-matrix
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: target/release/zeroclaw